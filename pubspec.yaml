name: ayurvanta
description: AyurVanta - Advanced Medical Technology Ecosystem
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  pin_code_fields: ^8.0.1
  lottie: ^3.0.0
  animate_do: ^3.3.4
  http: ^1.2.0
  flutter_dotenv: ^5.1.0
  intl: ^0.19.0
  google_sign_in: ^6.2.1
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0
  geolocator: ^11.1.0
  permission_handler: ^11.3.0
  provider: ^6.1.2
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.5
  image_picker: ^1.0.7
  razorpay_flutter: ^1.3.6
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  avatar_glow: ^3.0.0
  url_launcher: ^6.3.2
  flutter_local_notifications: ^18.0.1
  audioplayers: ^6.0.0
  timezone: ^0.10.1
  sensors_plus: ^4.0.2
  flutter_blue_plus: ^1.31.7
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  firebase_messaging: ^16.1.3
  android_alarm_manager_plus: ^5.0.0
  telephony: ^0.2.0
  google_maps_flutter: ^2.16.0
  workmanager: ^0.9.0+3
  dio: ^5.9.2
  flutter_native_splash: ^2.3.0
  flutter_launcher_icons: ^0.13.1
  cupertino_icons: ^1.0.6
  web_socket_channel: ^2.4.0
  hive_flutter: ^1.1.0
  sentry_flutter: ^7.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/logo/
    - assets/lang/

flutter_native_splash:
  color: "#1A5F7A"
  image: assets/logo/ayurvanta_logo.jpeg
  android: true
  ios: true
  android_gravity: center
  ios_content_mode: center
  web: true
  web_image_mode: center

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/ayurvanta_logo.jpeg"
  adaptive_icon_background: "#1A5F7A"
  adaptive_icon_foreground: "assets/logo/ayurvanta_logo.jpeg"
  web:
    generate: true
    image_path: "assets/logo/ayurvanta_logo.jpeg"
    background_color: "#1A5F7A"
    theme_color: "#1A5F7A"
